<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>
<link rel="stylesheet" href="style2-1.css">
</head>

<body>

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<label>Họ và tên</label>
<input type="text" id="fullname" maxlength="50">
<div id="nameCount">0/50</div>
<div class="error" id="fullnameError"></div>

<label>Email</label>
<input type="text" id="email">
<div class="error" id="emailError"></div>

<label>Số điện thoại</label>
<input type="text" id="phone">
<div class="error" id="phoneError"></div>

<label>Mật khẩu</label>

<div class="password-box">
<input type="password" id="password">
<button type="button" id="togglePass">👁</button>
</div>

<div id="strengthText"></div>

<div class="strength-bar">
<div id="strengthBar"></div>
</div>

<div class="error" id="passwordError"></div>

<label>Xác nhận mật khẩu</label>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>

<label>Giới tính</label><br>

<input type="radio" name="gender" value="Nam"> Nam
<input type="radio" name="gender" value="Nữ"> Nữ

<div class="error" id="genderError"></div>

<br>

<input type="checkbox" id="terms"> Đồng ý điều khoản
<div class="error" id="termsError"></div>

<br><br>

<button type="submit">Đăng ký</button>

</form>

<h3 id="success"></h3>

<script src="simple2-1.js"></script>

</body>
</html>
